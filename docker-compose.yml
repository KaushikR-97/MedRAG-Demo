services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medrag
      POSTGRES_PASSWORD: medrag
      POSTGRES_DB: medrag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrag -d medrag"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
    command: rq worker medrag --url redis://redis:6379/0

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
      PORT: 5173
    command: sh -c "npm install && npm run build && npm run start"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
